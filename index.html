<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Tiles Clone</title>
    <link rel="stylesheet" href="style.css?v=20">
</head>
<body>
    <div id="wrapper" style="display: flex; justify-content: center; align-items: flex-start; width: 100%;">
        <div id="game-container-wrapper" style="position: relative;">
            <div id="game-container">
            <canvas id="gameCanvas" width="400" height="800"></canvas>
        <div id="ui-layer">
            <div id="start-screen" class="screen">
                <h1>Piano Tiles</h1>
                <input type="text" id="playerName" placeholder="名前を入力">
                <div id="mode-selection" style="margin-bottom: 20px; color: white; text-align: left;">
                    <label><input type="radio" name="gameMode" value="normal" checked> <span id="label-normal">Normal (4鍵)</span></label><br>
                    <label><input type="radio" name="gameMode" value="hyper"> <span id="label-hyper">Hyper (6鍵)</span></label><br>
                    <label><input type="radio" name="gameMode" value="another"> <span id="label-another">Another (8鍵)</span></label><br>
                    <label><input type="radio" name="gameMode" value="leggendaria"> <span id="label-leggendaria">Leggendaria (9鍵)</span></label><br>
                    <label><input type="radio" name="gameMode" value="dp"> <span id="label-dp">DP (16鍵)</span></label>
                </div>
                <div style="margin-bottom: 20px; color: white; text-align: left; background-color: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px; width: 80%;">
                    <label style="cursor: pointer;"><input type="checkbox" id="practice-mode-toggle"> 練習モード (ミスで終了しない)</label>
                </div>
                <button id="btn-single">シングルプレイ</button>
                <button id="btn-multi">オンライン対戦</button>
                <button id="btn-ranking">ランキング</button>
                <button id="btn-key-config" style="background-color: #607d8b;">キー・カラー設定</button>
            </div>
            
            <div id="waiting-screen" class="screen hidden">
                <h2>対戦相手を待機中...</h2>
                <button id="btn-cancel">キャンセル</button>
            </div>

            <div id="game-over-screen" class="screen hidden">
                <h2 id="go-title">Game Over</h2>
                <p>スコア: <span id="final-score">0</span></p>
                <p id="multi-result" class="hidden"></p>
                <button id="btn-restart">戻る</button>
            </div>

            <div id="ranking-screen" class="screen hidden">
                <h2 id="ranking-title">ランキング</h2>
                <div style="margin-bottom: 10px; width: 100%; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;">
                    <button id="btn-rank-normal" style="width: auto; padding: 8px 12px; font-size: 14px; margin: 0;">Normal</button>
                    <button id="btn-rank-hyper" style="width: auto; padding: 8px 12px; font-size: 14px; margin: 0;">Hyper</button>
                    <button id="btn-rank-another" style="width: auto; padding: 8px 12px; font-size: 14px; margin: 0;">Another</button>
                    <button id="btn-rank-leggendaria" style="width: auto; padding: 8px 12px; font-size: 14px; margin: 0;">Leggendaria</button>
                    <button id="btn-rank-dp" style="width: auto; padding: 8px 12px; font-size: 14px; margin: 0;">DP</button>
                </div>
                <ul id="ranking-list"></ul>
                <button id="btn-close-ranking">閉じる</button>
            </div>
            
            <div id="score-display" class="hidden">0</div>
            <div id="opponent-score-display" class="hidden">Opponent: 0</div>
        </div> <!-- Close ui-layer -->
        </div> <!-- Close game-container -->
        
        <div id="side-panels" style="position: absolute; left: 100%; top: 0; margin-left: 20px; display: flex; flex-direction: column; gap: 20px;">
        <div id="practice-menu-screen" class="hidden" style="background-color: rgba(0,0,0,0.8); padding: 15px 20px; border-radius: 10px; width: 350px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; border: 1px solid #555;">
            <h2 style="margin-top: 0; font-size: 22px; color: white;">練習モード設定</h2>
            
            <div style="text-align: left; margin-bottom: 20px; width: 100%;">
                <label style="color: white; font-size: 16px; display: block; margin-bottom: 5px;">固定速度: <span id="practice-speed-val">5</span></label>
                <input type="range" id="practice-speed-slider" min="1" max="50" value="5" style="width: 100%;">
            </div>
            
            <button id="btn-quit-practice" style="padding: 10px 20px; background-color: #F44336; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%;">練習を終了する</button>
        </div>
        
        <div id="key-config-screen" class="hidden" style="background-color: rgba(0,0,0,0.8); padding: 15px 20px; border-radius: 10px; width: 500px; max-width: 100%; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; overflow-y: auto; max-height: 800px; border: 1px solid #555;">
            <h2 style="margin-top: 0; font-size: 22px;">キー・カラー・長さ設定</h2>
            
            <div style="text-align: left; margin-bottom: 15px; width: 90%; color: white;">
                <label style="margin-right: 10px; cursor: pointer;"><input type="radio" name="configMode" value="normal"> 4鍵</label>
                <label style="margin-right: 10px; cursor: pointer;"><input type="radio" name="configMode" value="hyper"> 6鍵</label>
                <label style="margin-right: 10px; cursor: pointer;"><input type="radio" name="configMode" value="another"> 8鍵</label>
                <label style="margin-right: 10px; cursor: pointer;"><input type="radio" name="configMode" value="leggendaria"> 9鍵</label>
                <label style="cursor: pointer;"><input type="radio" name="configMode" value="dp"> 16鍵</label>
            </div>
            
            <div style="text-align: left; margin-bottom: 15px; width: 90%;">
                <label style="color: white; font-size: 14px; display: block; margin-bottom: 5px;">タイルの長さ: <span id="tile-length-val">150</span></label>
                <input type="range" id="tile-length-slider" min="0" max="150" value="150" style="width: 100%;">
            </div>
            
            <div style="text-align: left; margin-bottom: 15px; width: 90%;">
                <label style="color: white; font-size: 14px; display: block; margin-bottom: 5px;">プレイ画面の横幅: <span id="board-width-val">400</span>px</label>
                <input type="range" id="board-width-slider" min="200" max="1200" step="10" value="400" style="width: 100%;">
            </div>
            
            <div style="text-align: left; margin-bottom: 20px; width: 90%;">
                <label style="color: white; font-size: 14px; cursor: pointer; display: block; margin-bottom: 10px;">
                    <input type="checkbox" id="show-judgement-line"> たたく位置の基準線（横線）を表示する
                </label>
                <label style="color: white; font-size: 14px; display: block; margin-bottom: 5px;">基準線の位置（下からの距離）: <span id="line-offset-val">60</span>px</label>
                <input type="range" id="line-offset-slider" min="0" max="800" value="60" style="width: 100%;">
            </div>
            
            <div style="text-align: left; margin-bottom: 20px; width: 90%;">
                <div id="config-section-normal">
                    <h3 style="color: white; margin-bottom: 5px; font-size: 16px;">Normal (4鍵)</h3>
                    <div id="config-normal" class="key-config-row"></div>
                </div>
                <div id="config-section-hyper" class="hidden">
                    <h3 style="color: white; margin-bottom: 5px; font-size: 16px;">Hyper (6鍵)</h3>
                    <div id="config-hyper" class="key-config-row"></div>
                </div>
                <div id="config-section-another" class="hidden">
                    <h3 style="color: white; margin-bottom: 5px; font-size: 16px;">Another (8鍵)</h3>
                    <div id="config-another" class="key-config-row"></div>
                </div>
                <div id="config-section-leggendaria" class="hidden">
                    <h3 style="color: white; margin-bottom: 5px; font-size: 16px;">Leggendaria (9鍵)</h3>
                    <div id="config-leggendaria" class="key-config-row"></div>
                </div>
                <div id="config-section-dp" class="hidden">
                    <h3 style="color: white; margin-bottom: 5px; font-size: 16px;">DP (16鍵)</h3>
                    <div id="config-dp" class="key-config-row"></div>
                </div>
            </div>
            <div style="display: flex; gap: 10px; width: 90%;">
                <button id="btn-save-keys" style="width: auto; flex: 1; margin-bottom: 0;">保存</button>
                <button id="btn-cancel-keys" style="width: auto; flex: 1; margin-bottom: 0; background-color: #6c757d;">キャンセル</button>
            </div>
            <div style="width: 90%; margin-top: 10px;">
                <button id="btn-reset-keys" style="width: 100%; background-color: #dc3545;">初期設定に戻す</button>
            </div>
        </div>
        
        <div id="opponent-container" class="hidden">
            <h3>Opponent</h3>
            <canvas id="opponentCanvas" width="200" height="400"></canvas>
        </div>
        </div> <!-- Close side-panels -->
        </div> <!-- Close game-container-wrapper -->
    </div> <!-- Close wrapper -->
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="game.js?v=23"></script>
</body>
</html>
