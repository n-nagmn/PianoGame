<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Tiles Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
        <div id="game-container">
            <canvas id="gameCanvas" width="400" height="800"></canvas>
        <div id="ui-layer">
            <div id="start-screen" class="screen">
                <h1>Piano Tiles</h1>
                <input type="text" id="playerName" placeholder="名前を入力">
                <div id="mode-selection" style="margin-bottom: 20px; color: white;">
                    <label><input type="radio" name="gameMode" value="normal" checked> Normal(4鍵: DFJK)</label><br>
                    <label><input type="radio" name="gameMode" value="hyper"> Hyper(6鍵: SDFJKL)</label><br>
                    <label><input type="radio" name="gameMode" value="another"> Another(8鍵: ASDFJKL+)</label>
                </div>
                <button id="btn-single">シングルプレイ</button>
                <button id="btn-multi">オンライン対戦</button>
                <button id="btn-ranking">ランキング</button>
            </div>
            
            <div id="waiting-screen" class="screen hidden">
                <h2>対戦相手を待機中...</h2>
                <button id="btn-cancel">キャンセル</button>
            </div>

            <div id="game-over-screen" class="screen hidden">
                <h2 id="go-title">Game Over</h2>
                <p>スコア: <span id="final-score">0</span></p>
                <p id="multi-result" class="hidden"></p>
                <button id="btn-restart">戻る</button>
            </div>

            <div id="ranking-screen" class="screen hidden">
                <h2 id="ranking-title">ランキング</h2>
                <div style="margin-bottom: 10px;">
                    <button id="btn-rank-normal" style="width: auto; padding: 8px 12px; font-size: 14px; margin: 0 5px;">Normal</button>
                    <button id="btn-rank-hyper" style="width: auto; padding: 8px 12px; font-size: 14px; margin: 0 5px;">Hyper</button>
                    <button id="btn-rank-another" style="width: auto; padding: 8px 12px; font-size: 14px; margin: 0 5px;">Another</button>
                </div>
                <ul id="ranking-list"></ul>
                <button id="btn-close-ranking">閉じる</button>
            </div>
            
            <div id="score-display" class="hidden">0</div>
            <div id="opponent-score-display" class="hidden">Opponent: 0</div>
        </div> <!-- Close ui-layer -->
        </div> <!-- Close game-container -->
        
        <div id="opponent-container" class="hidden">
            <h3>Opponent</h3>
            <canvas id="opponentCanvas" width="200" height="400"></canvas>
        </div>
    </div>
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="game.js?v=6"></script>
</body>
</html>
